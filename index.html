<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jai Hind Construction ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .login-container { max-width: 400px; margin-top: 100px; }
        #dashboard-section { display: none; }
        .card { border-radius: 10px; border: none; }
    </style>
</head>
<body>

    <div class="container login-container" id="login-section">
        <div class="card shadow p-4">
            <h3 class="text-center text-primary mb-4 fw-bold">JAI HIND ERP</h3>
            <div id="error-msg" class="alert alert-danger d-none text-center rounded"></div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="admin@jaihind.com">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter Password">
            </div>
            <button id="login-btn" class="btn btn-primary w-100 fw-bold p-2" onclick="processLogin()">LOGIN</button>
        </div>
    </div>

    <div class="container-fluid" id="dashboard-section">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 mt-2 rounded shadow-sm">
            <a class="navbar-brand fw-bold" href="#">Jai Hind Construction</a>
            <div class="ms-auto text-white fw-bold" id="user-info"></div>
            <button class="btn btn-sm btn-danger ms-3 fw-bold" onclick="logout()">Logout</button>
        </nav>

        <div class="row mt-4 px-2">
            <div class="col-md-2 mb-3">
                <div class="list-group shadow-sm">
                    <a href="#" class="list-group-item list-group-item-action active fw-bold">Dashboard</a>
                    <a href="#" class="list-group-item list-group-item-action">Transactions</a>
                    <a href="#" class="list-group-item list-group-item-action">Material List</a>
                </div>
            </div>
            
            <div class="col-md-10">
                <div class="card p-4 shadow-sm">
                    <h4 class="mb-4 text-secondary fw-bold border-bottom pb-2">Business Summary</h4>
                    
                    <div class="row" id="dashboard-cards">
                        <div class="col-md-3 mb-3">
                            <div class="card bg-success text-white shadow p-3">
                                <h6 class="text-uppercase" style="letter-spacing: 1px;">Total Income</h6>
                                <h3 id="dash-income" class="fw-bold mt-2">Loading...</h3>
                            </div>
                        </div>
                        
                        <div class="col-md-3 mb-3">
                            <div class="card bg-danger text-white shadow p-3">
                                <h6 class="text-uppercase" style="letter-spacing: 1px;">Total Expense</h6>
                                <h3 id="dash-expense" class="fw-bold mt-2">Loading...</h3>
                            </div>
                        </div>

                        <div class="col-md-3 mb-3">
                            <div class="card bg-primary text-white shadow p-3">
                                <h6 class="text-uppercase" style="letter-spacing: 1px;">Net Balance</h6>
                                <h3 id="dash-balance" class="fw-bold mt-2">Loading...</h3>
                            </div>
                        </div>

                        <div class="col-md-3 mb-3">
                            <div class="card bg-warning text-dark shadow p-3">
                                <h6 class="text-uppercase" style="letter-spacing: 1px;">Market Dues</h6>
                                <h3 id="dash-dues" class="fw-bold mt-2">Loading...</h3>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwEhsKonoUzRLXW8P25HXlKO3e6UWAy9dE-oJXIBuYcHKJC1nNc96ABnFOQkh-Yur8s/exec";

        async function processLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('login-btn');
            const errorBox = document.getElementById('error-msg');

            if (!email || !password) {
                showError("Please enter both email and password.");
                return;
            }

            loginBtn.innerHTML = "Verifying...";
            loginBtn.disabled = true;
            errorBox.classList.add('d-none');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'LOGIN', email: email, password: password }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // Hide login, show dashboard
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('dashboard-section').style.display = 'block';
                    document.getElementById('user-info').innerText = `Welcome, ${data.user.name} (${data.user.role})`;
                    
                    // Fetch Dashboard Data
                    loadDashboardData();
                } else {
                    showError(data.message);
                }
            } catch (error) {
                showError("Server Error! Check console or API URL.");
                console.error("Fetch Error:", error);
            } finally {
                loginBtn.innerHTML = "LOGIN";
                loginBtn.disabled = false;
            }
        }

        async function loadDashboardData() {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'GET_DASHBOARD' }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await response.json();

                if (result.status === 'success') {
                    // Update the UI cards with fetched data
                    document.getElementById('dash-income').innerText = "₹ " + result.data.income.toLocaleString();
                    document.getElementById('dash-expense').innerText = "₹ " + result.data.expense.toLocaleString();
                    document.getElementById('dash-balance').innerText = "₹ " + result.data.balance.toLocaleString();
                    document.getElementById('dash-dues').innerText = "₹ " + result.data.dues.toLocaleString();
                } else {
                    alert("Dashboard Error: " + result.message);
                }
            } catch (error) {
                console.error("Dashboard Fetch Error:", error);
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-msg');
            errorBox.innerText = msg;
            errorBox.classList.remove('d-none');
        }

        function logout() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('password').value = ""; // Only clear password on logout
        }
    </script>
</body>
</html>
