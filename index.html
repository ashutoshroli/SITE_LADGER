<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jai Hind Construction ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .login-container { max-width: 400px; margin-top: 100px; }
        #dashboard-section { display: none; }
        .table-responsive { max-height: 65vh; overflow-y: auto; }
        thead th { position: sticky; top: 0; background-color: #343a40 !important; color: white; z-index: 1;}
        .card { border-radius: 10px; border: none; }
    </style>
</head>
<body>

    <div class="container login-container" id="login-section">
        <div class="card shadow p-4">
            <h3 class="text-center text-primary mb-4 fw-bold">JAI HIND ERP</h3>
            <div id="error-msg" class="alert alert-danger d-none text-center rounded"></div>
            
            <div class="mb-3">
                <input type="email" id="email" class="form-control p-2" placeholder="Email Address">
            </div>
            <div class="mb-4">
                <input type="password" id="password" class="form-control p-2" placeholder="Password">
            </div>
            <button id="login-btn" class="btn btn-primary w-100 fw-bold p-2" onclick="processLogin()">LOGIN</button>
        </div>
    </div>

    <div class="container-fluid" id="dashboard-section">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 mt-2 rounded shadow-sm">
            <a class="navbar-brand fw-bold" href="#">Jai Hind Construction</a>
            <div class="ms-auto text-white fw-bold" id="user-info"></div>
            <button class="btn btn-sm btn-danger ms-3 fw-bold" onclick="logout()">Logout</button>
        </nav>

        <div class="row mt-4 px-2">
            <div class="col-md-2 mb-3">
                <div class="list-group shadow-sm">
                    <a href="#" class="list-group-item list-group-item-action fw-bold" onclick="showView('dash-view')">📊 Dashboard</a>
                    <a href="#" class="list-group-item list-group-item-action fw-bold" onclick="showView('data-view')">🗄️ Master Database</a>
                </div>
            </div>
            
            <div class="col-md-10">
                
                <div id="dash-view" class="card p-4 shadow-sm mb-3">
                    <h4 class="mb-4 text-secondary fw-bold border-bottom pb-2">Business Summary</h4>
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <div class="card bg-success text-white shadow p-3">
                                <h6>Total Income</h6><h3 id="dash-income" class="fw-bold mt-2">Loading...</h3>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="card bg-danger text-white shadow p-3">
                                <h6>Total Expense</h6><h3 id="dash-expense" class="fw-bold mt-2">Loading...</h3>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="card bg-primary text-white shadow p-3">
                                <h6>Net Balance</h6><h3 id="dash-balance" class="fw-bold mt-2">Loading...</h3>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="card bg-warning text-dark shadow p-3">
                                <h6>Market Dues</h6><h3 id="dash-dues" class="fw-bold mt-2">Loading...</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="data-view" class="card p-4 shadow-sm mb-3" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                        <h4 class="text-secondary fw-bold mb-0">Database Viewer</h4>
                        <select id="sheet-selector" class="form-select w-auto shadow-sm border-primary" onchange="fetchSheetData()">
                            <option value="TRANSACTIONS">TRANSACTIONS (Len-Den)</option>
                            <option value="DUES">DUES (Baki Khata)</option>
                            <option value="USERS">USERS (Logins)</option>
                            <option value="ITEM DETAILS">ITEM DETAILS</option>
                            <option value="ITEM LIST">ITEM LIST</option>
                            <option value="VILLAGE MASTER">VILLAGE MASTER</option>
                            <option value="Login Form">Login Form</option>
                            <option value="BY DATE">BY DATE</option>
                            <option value="DASHBOARD">DASHBOARD</option>
                            <option value="ITEM BY DATE">ITEM BY DATE</option>
                            <option value="NUMBERS">NUMBERS</option>
                        </select>
                    </div>

                    <input type="text" id="searchInput" class="form-control mb-3 border-primary shadow-sm" onkeyup="filterTable()" placeholder="🔍 Is table me kuch bhi search karein... (e.g., Name, Amount, Date)">

                    <div class="table-responsive">
                        <table class="table table-bordered table-striped table-hover text-nowrap" id="dynamic-table">
                            <thead id="table-head">
                                <tr><th>Select a sheet to load data...</th></tr>
                            </thead>
                            <tbody id="table-body">
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Aapka pehle se diya hua Deployment URL
        const API_URL = "https://script.google.com/macros/s/AKfycbwEhsKonoUzRLXW8P25HXlKO3e6UWAy9dE-oJXIBuYcHKJC1nNc96ABnFOQkh-Yur8s/exec";

        // Navigation Controller
        function showView(viewId) {
            document.getElementById('dash-view').style.display = 'none';
            document.getElementById('data-view').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
            
            if(viewId === 'data-view') {
                fetchSheetData(); // Automatically load data when tab is opened
            }
        }

        // Login Logic
        async function processLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('login-btn');
            const errorBox = document.getElementById('error-msg');

            if (!email || !password) return showError("Please enter email & password.");
            
            loginBtn.innerHTML = "Verifying..."; 
            loginBtn.disabled = true; 
            errorBox.classList.add('d-none');

            try {
                const res = await fetch(API_URL, {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'LOGIN', email, password }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('dashboard-section').style.display = 'block';
                    document.getElementById('user-info').innerText = `Welcome, ${data.user.name}`;
                    loadDashboardData();
                } else {
                    showError(data.message);
                }
            } catch (e) { 
                showError("Server Connection Failed! Internet ya URL check karein."); 
            } finally { 
                loginBtn.innerHTML = "LOGIN"; 
                loginBtn.disabled = false; 
            }
        }

        // Fetch Dashboard Numbers
        async function loadDashboardData() {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'GET_DASHBOARD' }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const r = await res.json();
                
                if (r.status === 'success') {
                    document.getElementById('dash-income').innerText = "₹ " + r.data.income.toLocaleString('en-IN');
                    document.getElementById('dash-expense').innerText = "₹ " + r.data.expense.toLocaleString('en-IN');
                    document.getElementById('dash-balance').innerText = "₹ " + r.data.balance.toLocaleString('en-IN');
                    document.getElementById('dash-dues').innerText = "₹ " + r.data.dues.toLocaleString('en-IN');
                }
            } catch (e) { console.error("Dashboard Load Error:", e); }
        }

        // Fetch Master Database Sheet
        async function fetchSheetData() {
            const sheetName = document.getElementById('sheet-selector').value;
            const thead = document.getElementById('table-head');
            const tbody = document.getElementById('table-body');
            
            document.getElementById('searchInput').value = ""; // Reset Search

            thead.innerHTML = `<tr><th class="text-primary text-center">Loading data for ${sheetName}... Please wait.</th></tr>`;
            tbody.innerHTML = '';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST', 
                    body: JSON.stringify({ action: 'GET_SHEET_DATA', sheetName: sheetName }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const r = await res.json();

                if (r.status === 'success') {
                    // Create Headings dynamically
                    let headHTML = '<tr>';
                    r.headers.forEach(h => { headHTML += `<th>${h}</th>`; });
                    headHTML += '</tr>';
                    thead.innerHTML = headHTML;

                    // Create Data Rows dynamically
                    let bodyHTML = '';
                    r.rows.forEach(row => {
                        bodyHTML += '<tr>';
                        row.forEach(cell => { bodyHTML += `<td>${cell || '-'}</td>`; });
                        bodyHTML += '</tr>';
                    });
                    tbody.innerHTML = bodyHTML;
                } else {
                    thead.innerHTML = `<tr><th class="text-danger">Error: ${r.message}</th></tr>`;
                }
            } catch (e) {
                thead.innerHTML = `<tr><th class="text-danger">Failed to fetch data.</th></tr>`;
            }
        }

        // Live Frontend Search Filter
        function filterTable() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let rows = document.getElementById("table-body").getElementsByTagName("tr");

            for (let i = 0; i < rows.length; i++) {
                let rowData = rows[i].innerText.toLowerCase();
                if (rowData.includes(input)) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }

        // Utility Functions
        function showError(msg) {
            const err = document.getElementById('error-msg'); 
            err.innerText = msg; 
            err.classList.remove('d-none');
        }
        
        function logout() { 
            location.reload(); 
        }
    </script>
</body>
</html>
